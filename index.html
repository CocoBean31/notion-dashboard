 <meta charset="UTF-8">

   #container{

<body>

<div id="greeting"></div>

<script>
const hour = new Date().getHours();

let greeting;

if(hour < 12){
    greeting = "Good morning, Chloë ⋆☕︎˖";
}else if(hour < 18){
    greeting = "Good afternoon, Chloë .☘︎ ݁˖";
}else{
    greeting = "Good evening, Chloë‧ ₊˚ ⏾. ⋅";
}

document.getElementById("greeting").innerHTML = greeting;
</script>

</body>
