<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
<style>
body{
    margin:0;
    padding:0;

    font-family:"EB Garamond", serif;
    background:transparent;
    color:#4d6755;

    font-size:44px;
    font-weight:600;
    line-height:1.1;
    letter-spacing:-0.02em;

    display:flex;
    align-items:center;
}
</style>
</head>
<body>

<div id="greeting"></div>

<script>
const hour = new Date().getHours();

let greeting;

if(hour < 12){
    greeting = "Good morning, Chloë ⋆☕︎˖";
}else if(hour < 18){
    greeting = "Good afternoon, Chloë .☘︎ ݁˖";
}else{
    greeting = "Good evening, Chloë‧ ₊˚ ⏾. ⋅";
}

document.getElementById("greeting").innerHTML = greeting;
</script>

</body>
</html>
